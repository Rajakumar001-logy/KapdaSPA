<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — VASTRA CARE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body class="app-body">
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">
          <span class="logo-mark" aria-hidden="true"></span>
          <span class="logo-text">VASTRA CARE</span>
        </a>
        <nav class="site-nav site-nav--static" aria-label="App">
          <ul class="nav-list">
            <li><a href="booking.html">Customer</a></li>
            <li><a href="index.html">Home</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container app-main">
      <p class="eyebrow">Operations</p>
      <h1 class="app-title">Admin console</h1>
      <p class="app-lead">
        Log in with an admin account (set <code>SEED_ADMIN_EMAIL</code> / <code>SEED_ADMIN_PASSWORD</code> in
        <code>server/.env</code>, restart the server). Update order status like a partner dashboard.
      </p>

      <section class="app-panel">
        <h2 class="app-panel-title">Admin login</h2>
        <form id="admin-login" class="form-grid">
          <label class="field">
            <span class="field-label">Email</span>
            <input class="input" name="email" type="email" required />
          </label>
          <label class="field">
            <span class="field-label">Password</span>
            <input class="input" name="password" type="password" required />
          </label>
          <button type="submit" class="btn btn-primary">Log in</button>
        </form>
        <p id="admin-auth-msg" class="app-message"></p>
        <button type="button" id="admin-logout" class="btn btn-ghost" hidden>Log out</button>
      </section>

      <section id="admin-workspace" class="app-panel" hidden>
        <h2 class="app-panel-title">Bookings</h2>
        <button type="button" id="admin-refresh" class="btn btn-ghost btn-sm">Refresh</button>
        <ul id="admin-bookings" class="admin-bookings"></ul>

        <div id="admin-detail" class="booking-detail" hidden>
          <h3 class="app-subtitle">Booking <span id="adm-detail-id"></span></h3>
          <p><span class="muted">Customer:</span> <span id="adm-customer"></span></p>
          <p><span class="muted">Address:</span> <span id="adm-address"></span></p>
          <p><span class="muted">Status:</span> <strong id="adm-status"></strong></p>
          <label class="field">
            <span class="field-label">New status</span>
            <select id="adm-status-select" class="input"></select>
          </label>
          <label class="field">
            <span class="field-label">Note (optional)</span>
            <input class="input" id="adm-status-note" placeholder="Rider assigned, delay, etc." />
          </label>
          <button type="button" id="adm-save-status" class="btn btn-primary">Save status</button>
          <p id="adm-save-msg" class="app-message"></p>
          <ol id="adm-timeline" class="timeline"></ol>
          <button type="button" id="adm-close" class="btn btn-ghost">Close</button>
        </div>
      </section>
    </main>

    <script src="js/admin.js"></script>
  </body>
</html>
